services:
  frontend:
    build: .
    command: ["python", "-m", "pspcz_analyzer.main_frontend"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - cache-data:/data/cache:ro
    env_file:
      - .env
    environment:
      PSPCZ_CACHE_DIR: /data/cache
      PSPCZ_DEV: "0"
      PORT: "${PORT:-8000}"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build: .
    command: ["python", "-m", "pspcz_analyzer.main_backend"]
    ports:
      - "${ADMIN_PORT:-8001}:${ADMIN_PORT:-8001}"
    volumes:
      - cache-data:/data/cache
    env_file:
      - .env
    environment:
      PSPCZ_CACHE_DIR: /data/cache
      PSPCZ_DEV: "0"
      ADMIN_PORT: "${ADMIN_PORT:-8001}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cache-data:
