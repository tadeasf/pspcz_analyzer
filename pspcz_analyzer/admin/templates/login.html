<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login — PSP.cz Analyzer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #212529;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 2rem;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #003168;
        }
        .login-brand p {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #495057;
            margin-bottom: 0.25rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 1rem;
            transition: border-color 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0,102,204,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 0.65rem;
            background: #003168;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #002450; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>PSP.cz Analyzer</h1>
            <p>Admin Dashboard — Pipeline Management</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</body>
</html>
