{% extends "base.html" %}
{% block title %}{{ _("laws.title") }} — {{ _("site.short_title") }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _("laws.title") }}</h1>
    <p>{{ _("laws.subtitle") }}</p>
</div>

<form hx-get="/api/laws" hx-target="#results" hx-indicator="#loading" hx-push-url="false">
    <input type="hidden" name="period" value="{{ period }}">
    <div class="form-row">
        <label>
            {{ _("form.search_votes") }}
            <input type="search" name="search" placeholder="{{ _('form.search_placeholder') }}" value="">
        </label>
        <label>
            {{ _("laws.status_filter") }}
            <select name="status">
                <option value="">{{ _("laws.status.all") }}</option>
                {% for s in statuses %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            {{ _("form.topic") }}
            <select name="topic">
                <option value="">{{ _("form.all_topics") }}</option>
                {% for t in topics %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
            </select>
        </label>
        <div class="form-submit">
            <label>&nbsp;</label>
            <button type="submit">{{ _("btn.search") }}</button>
        </div>
    </div>
</form>

<span id="loading" class="htmx-indicator" aria-busy="true">{{ _("loading") }}</span>

<div id="results" hx-get="/api/laws?period={{ period }}" hx-trigger="load" hx-indicator="#loading">
    <div class="skeleton">{% for _ in range(8) %}
    <div class="skeleton-pulse skeleton-table-row"></div>
    {% endfor %}</div>
</div>
{% endblock %}
